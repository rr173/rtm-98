version: '3.8'

services:
  backend:
    build: ./backend
    container_name: expression-sandbox-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - ADMIN_KEY=admin-secret-key
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: expression-sandbox-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
